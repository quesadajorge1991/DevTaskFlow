<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>DevTaskFlow - Usuarios</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/dashboard" class="nav-brand">DevTaskFlow</a>
            <div class="nav-menu">
                <a href="/tasks" class="nav-link">Tareas</a>
                <a href="/users" class="nav-link active">Usuarios</a>
                <span class="nav-user">Hola, <span sec:authentication="name"></span></span>
                    <form th:action="@{/logout}" method="post" style="display: inline;">
                    <button type="submit" class="nav-link logout-btn">Cerrar Sesión</button>
                </form>
            </div>
        </div>
    </nav>
    
    <div class="container">
        <div class="header-actions">
            <h1>Gestión de Usuarios</h1>
            <a href="/users/new" class="btn btn-primary">+ Nuevo Usuario</a>
        </div>
        
        <table class="table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Email</th>
                    <th>Rol</th>
                    <th>Fecha Registro</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="user : ${users}" th:object="${user}">
                    <td th:text="*{id}"></td>
                    <td th:text="*{name}"></td>
                    <td th:text="*{email}"></td>
                    <td><span class="badge" th:classappend="*{role} == 'ADMIN' ? 'admin' : 'developer'" th:text="*{role}"></span></td>
                    <td th:text="${user.createdAt} != null ? ${#temporals.format(user.createdAt, 'dd/MM/yyyy HH:mm')} : 'No registrada'"></td>
                    <td>
                        <a th:href="@{/users/delete/{id}(id=*{id})}" class="btn btn-sm btn-danger" onclick="return confirm('¿Eliminar este usuario?')">Eliminar</a>
                    </td>
                </tr>
                <tr th:if="${users.empty}">
                    <td colspan="6" class="text-center">No hay usuarios registrados</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
