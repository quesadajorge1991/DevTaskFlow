<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>DevTaskFlow - Formulario de Tarea</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/dashboard" class="nav-brand">DevTaskFlow</a>
            <div class="nav-menu">
                <a href="/tasks" class="nav-link">Tareas</a>
                <a sec:authorize="hasRole('ADMIN')" href="/users" class="nav-link">Usuarios</a>
                <span class="nav-user">Hola, <span sec:authentication="name"></span></span>
                   <form th:action="@{/logout}" method="post" style="display: inline;">
                    <button type="submit" class="nav-link logout-btn">Cerrar Sesión</button>
                </form>
            </div>
        </div>
    </nav>
    
    <div class="container">
        <div class="form-container">
            <h1 th:text="${task.id} != null ? 'Editar Tarea' : 'Nueva Tarea'"></h1>
            
            <form th:action="${task.id} != null ? @{/tasks/edit/{id}(id=${task.id})} : @{/tasks/new}" 
                  th:object="${task}" method="post">
                
                <div class="form-group">
                    <label for="title">Título:</label>
                    <input type="text" id="title" th:field="*{title}" required>
                </div>
                
                <div class="form-group">
                    <label for="description">Descripción:</label>
                    <textarea id="description" th:field="*{description}" rows="5"></textarea>
                </div>
                
                <div class="form-group">
                    <label for="priority">Prioridad:</label>
                    <select id="priority" th:field="*{priority}">
                        <option th:each="p : ${priorities}" th:value="${p}" th:text="${p.displayName}"></option>
                    </select>
                </div>
                
                <div th:if="${task.id} != null" class="form-group">
                    <label for="status">Estado:</label>
                    <select id="status" th:field="*{status}">
                        <option th:each="s : ${statuses}" th:value="${s}" th:text="${s.displayName}"></option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="dueDate">Fecha de Vencimiento:</label>
                    <input type="date" id="dueDate" th:field="*{dueDate}">
                </div>
                
                <div class="form-group">
                    <label for="assigneeId">Asignar a:</label>
                    <select id="assigneeId" name="assigneeId" required>
                        <option th:each="user : ${users}" th:value="${user.id}" th:text="${user.name + ' (' + user.email + ')'}" 
                                th:selected="${task.assignee != null and task.assignee.id == user.id}"></option>
                    </select>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Guardar</button>
                    <a href="/tasks" class="btn">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
