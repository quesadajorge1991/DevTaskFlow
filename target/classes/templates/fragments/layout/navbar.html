<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
</head>
<body>
    <!-- Fragmento del Navbar -->
    <nav th:fragment="navbar" class="navbar">
        <div class="nav-container">
            <a href="/dashboard" class="nav-brand">DevTaskFlow</a>
            <div class="nav-menu">
                <a href="/dashboard" class="nav-link">Home</a>
                <a href="/tasks" class="nav-link">Tareas</a>
                <a sec:authorize="hasRole('ADMIN')" href="/users" class="nav-link">Usuarios</a>
                <span class="nav-user">Hola, <span sec:authentication="name"></span></span>
                <form th:action="@{/logout}" method="post" style="display: inline;">
                    <button type="submit" class="nav-link logout-btn">Cerrar Sesión</button>
                </form>
            </div>
        </div>
    </nav>
</body>
</html>
